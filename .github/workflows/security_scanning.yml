---
# Managed by modulesync - DO NOT EDIT
# https://voxpupuli.org/docs/updating-files-managed-with-modulesync/

name: 🕵️ Security Scanning

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: security-scanning-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-matrix:
    name: Set up build matrix
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.build-matrix.outputs.build-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1

      - name: Generate build matrix
        id: build-matrix
        run: echo "build-matrix=$(yq -o=json build_platforms.yaml | jq -c)" >> "$GITHUB_OUTPUT"

  scan-container:
    name: Scan container (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    needs:
      - setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.build-matrix) }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          tags: 'ci/voxbox:${{ matrix.openvox_version }}'
          load: true
          push: false
          platforms: linux/${{ matrix.platform }}

      - name: Scan image with Anchore Grype
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: 'ci/voxbox:${{ matrix.openvox_version }}'
          fail-build: false

      - name: Inspect SARIF report
        run: jq . "${{ steps.scan.outputs.sarif }}"

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: 'grype-${{ matrix.label }}'
