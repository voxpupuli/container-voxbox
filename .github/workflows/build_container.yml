---
# Managed by modulesync - DO NOT EDIT
# https://voxpupuli.org/docs/updating-files-managed-with-modulesync/

name: 📦 Build and Publish

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-and-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-matrix:
    name: Set up build matrix
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.build-matrix.outputs.build-matrix }}
      openvox-release: ${{ steps.openvox-release.outputs.value }}
      openvox-version: ${{ steps.openvox-version.outputs.value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1

      - name: Generate build matrix
        id: build-matrix
        run: |
          matrix_json=$(yq -o=json build_platforms.yaml | jq -c)
          echo "build-matrix=$matrix_json" >> "$GITHUB_OUTPUT"

      - name: Read OpenVox release
        id: openvox-release
        run: |
          echo "value=$(yq '.include[0].openvox_release' build_platforms.yaml)" >> "$GITHUB_OUTPUT"

      - name: Read OpenVox version
        id: openvox-version
        run: |
          echo "value=$(yq '.include[0].openvox_version' build_platforms.yaml)" >> "$GITHUB_OUTPUT"

  build-and-push-container:
    name: Build VoxBox ${{ matrix.openvox_version }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs:
      - setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.build-matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build and publish container
        id: build
        uses: voxpupuli/gha-build-and-publish-a-container@v2
        with:
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          build_arch: linux/${{ matrix.platform }}
          build_context: .
          buildfile: Containerfile
          tags: |
            ghcr.io/${{ github.repository_owner }}/voxbox:${{ github.sha }}-v${{ matrix.openvox_release }}-${{ matrix.platform }}

  create-multiarch-manifests:
    name: Create multi-architecture manifests
    runs-on: ubuntu-latest
    needs:
      - setup-matrix
      - build-and-push-container
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: voxpupulibot
          password: ${{ secrets.DOCKERHUB_BOT_ADMIN_TOKEN }}

      - name: Create multi-architecture manifests
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-version }}-${{ github.ref_name }} -t ghcr.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-version }}-latest -t ghcr.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-release }}-${{ github.ref_name }} -t ghcr.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-release }} -t ghcr.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-release }}-latest -t ghcr.io/${{ github.repository_owner }}/voxbox:latest -t docker.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-version }}-${{ github.ref_name }} -t docker.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-version }}-latest -t docker.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-release }}-${{ github.ref_name }} -t docker.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-release }} -t docker.io/${{ github.repository_owner }}/voxbox:${{ needs.setup-matrix.outputs.openvox-release }}-latest -t docker.io/${{ github.repository_owner }}/voxbox:latest ghcr.io/${{ github.repository_owner }}/voxbox:${{ github.sha }}-v${{ needs.setup-matrix.outputs.openvox-release }}-arm64 ghcr.io/${{ github.repository_owner }}/voxbox:${{ github.sha }}-v${{ needs.setup-matrix.outputs.openvox-release }}-amd64

  publish-info:
    name: Publish diagnostics
    runs-on: ubuntu-latest
    needs:
      - setup-matrix
      - build-and-push-container
    container: ghcr.io/voxpupuli/voxbox:${{ github.sha }}-v${{ needs.setup-matrix.outputs.openvox-release }}-amd64
    steps:
      - name: Show image information
        run: |
          bundle check
          bundle env
          bundle outdated || true

  update-dockerhub-description:
    name: Update Docker Hub description
    runs-on: ubuntu-latest
    needs:
      - create-multiarch-manifests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: voxpupulibot
          password: ${{ secrets.DOCKERHUB_BOT_ADMIN_TOKEN }}
          repository: voxpupuli/voxbox
